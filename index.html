<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>rgba-color-generator</title>
</head>
<body>
  
  <div class="container my-4">
    <div class="row">
      <div class="col-md">
        
        <div class="row">
          <div class="col-md-7 mx-auto">
            <div class="d-flex flex-column justify-content-center align-items-center text-center">
              <h1 class="fw-normal">rgba color generator</h1>
              <p class="fw-light">
                program sederhana yang dibuat dengan menggunakan bahasa pemrograman javascript yang berguna untuk mengenerate sebuah warna rgba (<b class="fw-bold">red,green,blue,alpha</b>)
              </p>
            </div>
          </div>
        </div>
        
        <div class="row">
          <div class="col-md-7">
            <div class="box my-3"></div>
            <div class="input-group mb-3">
              <input type="text" class="form-control py-3 px-4 fw-light input" value="background: rgba(0, 0, 0, 1)">
              <button class="btn btn-primary py-3 px-4 copy fw-bold">Copy</button>
            </div>
          </div>
          <div class="col-md">
            <div class="form-group mb-3">
              <label for="red" class="form-label">Red</label>
              <input type="range" id="red" class="form-range red range" min="0" max="255">
            </div>
            <div class="form-group mb-3">
              <label for="green" class="form-label">Green</label>
              <input type="range" id="green" class="form-range green range" min="0" max="255">
            </div>
            <div class="form-group mb-3">
              <label for="blue" class="form-label">Blue</label>
              <input type="range" id="blue" class="form-range blue range" min="0" max="255">
            </div>
            <div class="form-group">
              <label for="alpha" class="form-label">Alpha</label>
              <input type="range" id="alpha" class="form-range alpha range" min="0" max="1" step="0.1" value="1">
            </div>
          </div>
        </div>
        
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
